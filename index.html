<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cartoon Character Colouring Book</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:linear-gradient(to bottom,#ffd6ec,#d6f0ff);
    padding:20px;
}

h1{
    text-align:center;
    color:#7a1cac;
    margin-bottom:10px;
    font-size:40px;
}

.subtitle{
    text-align:center;
    font-size:20px;
    margin-bottom:30px;
    color:#444;
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
    max-width:1300px;
    margin:auto;
}

.card{
    background:white;
    border-radius:25px;
    padding:20px;
    box-shadow:0 10px 20px rgba(0,0,0,0.15);
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:220px;
    height:220px;
    object-fit:contain;
    background:white;
    border:5px solid black;
    padding:10px;
    border-radius:20px;
    filter:grayscale(100%) contrast(200%);
}

.name{
    margin-top:15px;
    font-size:28px;
    color:#ff1493;
    font-weight:bold;
}

button{
    margin-top:18px;
    padding:12px 25px;
    border:none;
    border-radius:40px;
    background:#ff4da6;
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.08);
    background:#e60073;
}

.features{
    margin-top:50px;
    background:white;
    padding:30px;
    border-radius:30px;
    box-shadow:0 10px 20px rgba(0,0,0,0.15);
    max-width:1200px;
    margin-left:auto;
    margin-right:auto;
}

.features h2{
    text-align:center;
    margin-bottom:25px;
    color:#0066cc;
    font-size:35px;
}

.feature-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.feature-box{
    padding:20px;
    border-radius:20px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.yellow{background:#fff4b3;}
.pink{background:#ffd6eb;}
.green{background:#d9ffd9;}
.blue{background:#d6ecff;}

.footer{
    text-align:center;
    margin-top:35px;
    font-size:20px;
    font-weight:bold;
    color:#555;
}

</style>
</head>
<body>

<h1>🎨 Cartoon Character Colouring Book</h1>

<p class="subtitle">
Black & White Cartoon Colouring Pages for Kids
</p>

<div class="container">

<div class="card">
    <img src="https://cdn.pixabay.com/photo/2013/07/13/10/44/cat-157314_1280.png">
    <div class="name">Cute Cat</div>
    <button onclick="speak('Cute Cat colouring page')">
        🎨 Start Colouring
    </button>
</div>

<div class="card">
    <img src="https://cdn.pixabay.com/photo/2013/07/13/10/44/lion-157290_1280.png">
    <div class="name">Happy Lion</div>
    <button onclick="speak('Happy Lion colouring page')">
        🎨 Start Colouring
    </button>
</div>

<div class="card">
    <img src="https://cdn.pixabay.com/photo/2014/04/03/10/32/panda-310167_1280.png">
    <div class="name">Funny Panda</div>
    <button onclick="speak('Funny Panda colouring page')">
        🎨 Start Colouring
    </button>
</div>

<div class="card">
    <img src="https://cdn.pixabay.com/photo/2013/07/13/10/44/elephant-157289_1280.png">
    <div class="name">Baby Elephant</div>
    <button onclick="speak('Baby Elephant colouring page')">
        🎨 Start Colouring
    </button>
</div>

<div class="card">
    <img src="https://cdn.pixabay.com/photo/2013/07/13/10/44/rabbit-157311_1280.png">
    <div class="name">Little Rabbit</div>
    <button onclick="speak('Little Rabbit colouring page')">
        🎨 Start Colouring
    </button>
</div>

<div class="card">
    <img src="https://cdn.pixabay.com/photo/2013/07/13/10/44/monkey-157304_1280.png">
    <div class="name">Smiling Monkey</div>
    <button onclick="speak('Smiling Monkey colouring page')">
        🎨 Start Colouring
    </button>
</div>

</div>

<div class="features">

<h2>🌈 Kids Learning Features</h2>

<div class="feature-grid">

<div class="feature-box yellow">
🎨 Colouring Practice
</div>

<div class="feature-box pink">
🔊 Voice Speaking
</div>

<div class="feature-box green">
🐼 Cartoon Characters
</div>

<div class="feature-box blue">
📱 Mobile Friendly
</div>

</div>

</div>

<div class="footer">
Made for Kids Learning & Fun 🌈
</div>

<script>

function speak(text){

    let speech = new SpeechSynthesisUtterance(text);

    speech.rate = 0.9;

    speech.pitch = 1;

    speech.lang = "en-US";

    window.speechSynthesis.speak(speech);
}

</script>

</body>
</html>
