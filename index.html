<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Draw Animals</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5fbff;
    padding:20px;
}

h1{
    text-align:center;
    font-size:55px;
    margin-bottom:25px;
    font-weight:bold;
    color:#ff1493;
}

.title2{
    color:#00aaff;
}

.container{
    max-width:1400px;
    margin:auto;
}

.row{
    display:grid;
    grid-template-columns:180px repeat(6,1fr);
    gap:10px;
    margin-bottom:15px;
}

.label{
    background:#fff0c7;
    border-radius:20px;
    text-align:center;
    padding:15px;
    border:3px solid #ffcc00;
}

.label img{
    width:100px;
}

.label h2{
    margin-top:10px;
    font-size:32px;
}

.step{
    background:white;
    border-radius:20px;
    border:3px solid #ddd;
    height:220px;
    position:relative;
    overflow:hidden;
    cursor:pointer;
}

.step-number{
    position:absolute;
    top:10px;
    left:10px;
    background:orange;
    color:white;
    width:35px;
    height:35px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    font-size:20px;
}

svg{
    width:100%;
    height:100%;
}

.draw-area{
    fill:white;
    stroke:black;
    stroke-width:4;
}

.palette{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-bottom:30px;
    flex-wrap:wrap;
}

.color{
    width:55px;
    height:55px;
    border-radius:50%;
    cursor:pointer;
    border:4px solid white;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.footer{
    text-align:center;
    margin-top:30px;
    font-size:22px;
    font-weight:bold;
    color:#666;
}

@media(max-width:1100px){

.row{
    grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<h1>DRAW <span class="title2">ANIMALS</span></h1>

<div class="palette">

<div class="color" style="background:red" onclick="setColor('red')"></div>
<div class="color" style="background:blue" onclick="setColor('blue')"></div>
<div class="color" style="background:green" onclick="setColor('green')"></div>
<div class="color" style="background:yellow" onclick="setColor('yellow')"></div>
<div class="color" style="background:orange" onclick="setColor('orange')"></div>
<div class="color" style="background:pink" onclick="setColor('pink')"></div>
<div class="color" style="background:purple" onclick="setColor('purple')"></div>
<div class="color" style="background:brown" onclick="setColor('brown')"></div>

</div>

<div class="container">

<!-- LION -->

<div class="row">

<div class="label">

<img src="https://cdn-icons-png.flaticon.com/512/616/616412.png">

<h2>LION</h2>

</div>

<div class="step">
<div class="step-number">1</div>

<svg viewBox="0 0 200 200">

<circle cx="100" cy="90" r="45"
class="draw-area"
onclick="paint(this)" />

</svg>

</div>

<div class="step">
<div class="step-number">2</div>

<svg viewBox="0 0 200 200">

<circle cx="100" cy="90" r="45"
class="draw-area"
onclick="paint(this)" />

<circle cx="70" cy="55" r="12"
class="draw-area"
onclick="paint(this)" />

<circle cx="130" cy="55" r="12"
class="draw-area"
onclick="paint(this)" />

</svg>

</div>

<div class="step">
<div class="step-number">3</div>

<svg viewBox="0 0 200 200">

<circle cx="100" cy="90" r="45"
class="draw-area"
onclick="paint(this)" />

<circle cx="70" cy="55" r="12"
class="draw-area"
onclick="paint(this)" />

<circle cx="130" cy="55" r="12"
class="draw-area"
onclick="paint(this)" />

<circle cx="85" cy="90" r="5"
fill="black"/>

<circle cx="115" cy="90" r="5"
fill="black"/>

</svg>

</div>

<div class="step">
<div class="step-number">4</div>

<svg viewBox="0 0 200 200">

<circle cx="100" cy="90" r="60"
class="draw-area"
onclick="paint(this)" />

<circle cx="100" cy="90" r="45"
class="draw-area"
onclick="paint(this)" />

</svg>

</div>

<div class="step">
<div class="step-number">5</div>

<svg viewBox="0 0 200 200">

<circle cx="100" cy="90" r="60"
class="draw-area"
onclick="paint(this)" />

<circle cx="100" cy="90" r="45"
class="draw-area"
onclick="paint(this)" />

<rect x="80" y="135" width="15" height="40"
class="draw-area"
onclick="paint(this)" />

<rect x="105" y="135" width="15" height="40"
class="draw-area"
onclick="paint(this)" />

</svg>

</div>

<div class="step">
<div class="step-number">6</div>

<svg viewBox="0 0 200 200">

<circle cx="100" cy="90" r="60"
class="draw-area"
onclick="paint(this)" />

<circle cx="100" cy="90" r="45"
class="draw-area"
onclick="paint(this)" />

<rect x="80" y="135" width="15" height="40"
class="draw-area"
onclick="paint(this)" />

<rect x="105" y="135" width="15" height="40"
class="draw-area"
onclick="paint(this)" />

<path d="M120 150 Q180 130 170 180"
class="draw-area"
onclick="paint(this)" />

</svg>

</div>

</div>

<!-- ELEPHANT -->

<div class="row">

<div class="label" style="background:#dff4ff;border-color:#55bbff;">

<img src="https://cdn-icons-png.flaticon.com/512/1998/1998610.png">

<h2>ELEPHANT</h2>

</div>

<div class="step">
<div class="step-number">1</div>

<svg viewBox="0 0 200 200">

<circle cx="100" cy="90" r="45"
class="draw-area"
onclick="paint(this)" />

</svg>

</div>

<div class="step">
<div class="step-number">2</div>

<svg viewBox="0 0 200 200">

<circle cx="100" cy="90" r="45"
class="draw-area"
onclick="paint(this)" />

<circle cx="50" cy="90" r="25"
class="draw-area"
onclick="paint(this)" />

<circle cx="150" cy="90" r="25"
class="draw-area"
onclick="paint(this)" />

</svg>

</div>

<div class="step">
<div class="step-number">3</div>

<svg viewBox="0 0 200 200">

<circle cx="100" cy="90" r="45"
class="draw-area"
onclick="paint(this)" />

<circle cx="50" cy="90" r="25"
class="draw-area"
onclick="paint(this)" />

<circle cx="150" cy="90" r="25"
class="draw-area"
onclick="paint(this)" />

<rect x="90" y="90" width="20" height="60"
class="draw-area"
onclick="paint(this)" />

</svg>

</div>

<div class="step">
<div class="step-number">4</div>

<svg viewBox="0 0 200 200">

<circle cx="100" cy="90" r="45"
class="draw-area"
onclick="paint(this)" />

<circle cx="50" cy="90" r="25"
class="draw-area"
onclick="paint(this)" />

<circle cx="150" cy="90" r="25"
class="draw-area"
onclick="paint(this)" />

<rect x="90" y="90" width="20" height="60"
class="draw-area"
onclick="paint(this)" />

<rect x="60" y="145" width="20" height="35"
class="draw-area"
onclick="paint(this)" />

<rect x="120" y="145" width="20" height="35"
class="draw-area"
onclick="paint(this)" />

</svg>

</div>

<div class="step">
<div class="step-number">5</div>

<svg viewBox="0 0 200 200">

<ellipse cx="100" cy="90" rx="55" ry="50"
class="draw-area"
onclick="paint(this)" />

<circle cx="50" cy="90" r="25"
class="draw-area"
onclick="paint(this)" />

<circle cx="150" cy="90" r="25"
class="draw-area"
onclick="paint(this)" />

<rect x="90" y="90" width="20" height="60"
class="draw-area"
onclick="paint(this)" />

</svg>

</div>

<div class="step">
<div class="step-number">6</div>

<svg viewBox="0 0 200 200">

<ellipse cx="100" cy="90" rx="55" ry="50"
class="draw-area"
onclick="paint(this)" />

<circle cx="50" cy="90" r="25"
class="draw-area"
onclick="paint(this)" />

<circle cx="150" cy="90" r="25"
class="draw-area"
onclick="paint(this)" />

<rect x="90" y="90" width="20" height="60"
class="draw-area"
onclick="paint(this)" />

<rect x="60" y="145" width="20" height="35"
class="draw-area"
onclick="paint(this)" />

<rect x="120" y="145" width="20" height="35"
class="draw-area"
onclick="paint(this)" />

</svg>

</div>

</div>

</div>

<div class="footer">
🎨 Tap Any Shape To Color
</div>

<script>

let selectedColor = "red";

function setColor(color){

    selectedColor = color;

}

function paint(element){

    element.setAttribute("fill", selectedColor);

}

</script>

</body>
</html>
