<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fruits & Vegetables Coloring</title>

<style>

body{
    margin:0;
    padding:20px;
    font-family:Arial;
    background:#f5fbff;
}

h1{
    text-align:center;
    color:#ff1493;
    font-size:40px;
}

.colors{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin:25px 0;
}

.color{
    width:50px;
    height:50px;
    border-radius:50%;
    border:3px solid white;
    cursor:pointer;
    box-shadow:0 3px 8px rgba(0,0,0,0.3);
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

svg{
    width:220px;
    height:220px;
    cursor:pointer;
}

.name{
    font-size:24px;
    margin-top:10px;
    font-weight:bold;
}

button{
    margin-top:10px;
    padding:10px 20px;
    border:none;
    border-radius:30px;
    background:#ff1493;
    color:white;
    font-size:18px;
    cursor:pointer;
}

</style>
</head>

<body>

<h1>🎨 Fruits & Vegetables Coloring Book</h1>

<div class="colors">

<div class="color" style="background:red" onclick="setColor('red')"></div>
<div class="color" style="background:green" onclick="setColor('green')"></div>
<div class="color" style="background:blue" onclick="setColor('blue')"></div>
<div class="color" style="background:yellow" onclick="setColor('yellow')"></div>
<div class="color" style="background:orange" onclick="setColor('orange')"></div>
<div class="color" style="background:pink" onclick="setColor('pink')"></div>
<div class="color" style="background:purple" onclick="setColor('purple')"></div>
<div class="color" style="background:brown" onclick="setColor('brown')"></div>

</div>

<div class="container">

<!-- APPLE -->
<div class="card">
<svg viewBox="0 0 200 200">
<circle cx="100" cy="110" r="55" stroke="black" stroke-width="4" fill="white" onclick="fillColor(this)"/>
<rect x="95" y="30" width="10" height="30" stroke="black" stroke-width="3" fill="white" onclick="fillColor(this)"/>
</svg>
<div class="name">Apple</div>
<button onclick="reset(this)">Clear</button>
</div>

<!-- BANANA -->
<div class="card">
<svg viewBox="0 0 200 200">
<path d="M50 120 Q100 180 150 80" stroke="black" stroke-width="10" fill="white" onclick="fillPath(this)"/>
</svg>
<div class="name">Banana</div>
<button onclick="reset(this)">Clear</button>
</div>

<!-- ORANGE -->
<div class="card">
<svg viewBox="0 0 200 200">
<circle cx="100" cy="100" r="60" stroke="black" stroke-width="4" fill="white" onclick="fillColor(this)"/>
</svg>
<div class="name">Orange</div>
<button onclick="reset(this)">Clear</button>
</div>

<!-- MANGO -->
<div class="card">
<svg viewBox="0 0 200 200">
<ellipse cx="100" cy="110" rx="50" ry="70" stroke="black" stroke-width="4" fill="white" onclick="fillColor(this)"/>
</svg>
<div class="name">Mango</div>
<button onclick="reset(this)">Clear</button>
</div>

<!-- CARROT -->
<div class="card">
<svg viewBox="0 0 200 200">
<polygon points="100,40 150,170 50,170" stroke="black" stroke-width="4" fill="white" onclick="fillColor(this)"/>
</svg>
<div class="name">Carrot</div>
<button onclick="reset(this)">Clear</button>
</div>

<!-- TOMATO -->
<div class="card">
<svg viewBox="0 0 200 200">
<circle cx="100" cy="110" r="55" stroke="black" stroke-width="4" fill="white" onclick="fillColor(this)"/>
</svg>
<div class="name">Tomato</div>
<button onclick="reset(this)">Clear</button>
</div>

<!-- POTATO -->
<div class="card">
<svg viewBox="0 0 200 200">
<ellipse cx="100" cy="100" rx="60" ry="45" stroke="black" stroke-width="4" fill="white" onclick="fillColor(this)"/>
</svg>
<div class="name">Potato</div>
<button onclick="reset(this)">Clear</button>
</div>

<!-- BRINJAL -->
<div class="card">
<svg viewBox="0 0 200 200">
<ellipse cx="100" cy="120" rx="45" ry="65" stroke="black" stroke-width="4" fill="white" onclick="fillColor(this)"/>
</svg>
<div class="name">Brinjal</div>
<button onclick="reset(this)">Clear</button>
</div>

</div>

<script>

let selectedColor = "red";

function setColor(color){
    selectedColor = color;
}

function fillColor(element){
    element.setAttribute("fill", selectedColor);
}

function fillPath(element){
    element.style.stroke = selectedColor;
}

function reset(button){

    let card = button.parentElement;

    let shapes = card.querySelectorAll("circle, rect, ellipse, polygon");

    shapes.forEach(shape=>{
        shape.setAttribute("fill","white");
    });

    let paths = card.querySelectorAll("path");

    paths.forEach(path=>{
        path.style.stroke = "black";
    });
}

</script>

</body>
</html>
