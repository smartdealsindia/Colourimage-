<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Animal Coloring</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#f5fbff;
    font-family:Arial;
}

h1{
    text-align:center;
    color:#ff1493;
    font-size:50px;
    margin-bottom:20px;
}

.palette{
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
    margin-bottom:30px;
}

.color{
    width:55px;
    height:55px;
    border-radius:50%;
    cursor:pointer;
    border:4px solid white;
    box-shadow:0 3px 10px rgba(0,0,0,0.3);
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:25px;
    padding:20px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

svg{
    width:220px;
    height:220px;
}

.name{
    font-size:28px;
    font-weight:bold;
    margin-top:10px;
}

button{
    margin-top:15px;
    padding:12px 25px;
    border:none;
    background:#ff1493;
    color:white;
    border-radius:30px;
    font-size:18px;
    cursor:pointer;
}

.shape{
    fill:white;
    stroke:black;
    stroke-width:4;
    cursor:pointer;
}

</style>
</head>

<body>

<h1>🎨 Animal Coloring Book</h1>

<div class="palette">

<div class="color" style="background:red" onclick="setColor('red')"></div>
<div class="color" style="background:blue" onclick="setColor('blue')"></div>
<div class="color" style="background:green" onclick="setColor('green')"></div>
<div class="color" style="background:yellow" onclick="setColor('yellow')"></div>
<div class="color" style="background:orange" onclick="setColor('orange')"></div>
<div class="color" style="background:pink" onclick="setColor('pink')"></div>
<div class="color" style="background:purple" onclick="setColor('purple')"></div>
<div class="color" style="background:brown" onclick="setColor('brown')"></div>

</div>

<div class="container">

<!-- LION -->

<div class="card">

<svg viewBox="0 0 200 200">

<circle cx="100" cy="90" r="60"
class="shape"
onclick="paint(this)" />

<circle cx="100" cy="90" r="40"
class="shape"
onclick="paint(this)" />

<circle cx="70" cy="60" r="15"
class="shape"
onclick="paint(this)" />

<circle cx="130" cy="60" r="15"
class="shape"
onclick="paint(this)" />

<rect x="80" y="130" width="15" height="40"
class="shape"
onclick="paint(this)" />

<rect x="105" y="130" width="15" height="40"
class="shape"
onclick="paint(this)" />

</svg>

<div class="name">Lion</div>

<button onclick="clearCard(this)">Clear</button>

</div>

<!-- ELEPHANT -->

<div class="card">

<svg viewBox="0 0 200 200">

<ellipse cx="100" cy="90" rx="55" ry="50"
class="shape"
onclick="paint(this)" />

<circle cx="55" cy="90" r="25"
class="shape"
onclick="paint(this)" />

<circle cx="145" cy="90" r="25"
class="shape"
onclick="paint(this)" />

<rect x="90" y="90" width="20" height="60"
class="shape"
onclick="paint(this)" />

<rect x="60" y="145" width="20" height="35"
class="shape"
onclick="paint(this)" />

<rect x="120" y="145" width="20" height="35"
class="shape"
onclick="paint(this)" />

</svg>

<div class="name">Elephant</div>

<button onclick="clearCard(this)">Clear</button>

</div>

<!-- PANDA -->

<div class="card">

<svg viewBox="0 0 200 200">

<circle cx="100" cy="100" r="55"
class="shape"
onclick="paint(this)" />

<circle cx="65" cy="65" r="18"
class="shape"
onclick="paint(this)" />

<circle cx="135" cy="65" r="18"
class="shape"
onclick="paint(this)" />

<circle cx="80" cy="95" r="10"
class="shape"
onclick="paint(this)" />

<circle cx="120" cy="95" r="10"
class="shape"
onclick="paint(this)" />

</svg>

<div class="name">Panda</div>

<button onclick="clearCard(this)">Clear</button>

</div>

<!-- RABBIT -->

<div class="card">

<svg viewBox="0 0 200 200">

<circle cx="100" cy="110" r="50"
class="shape"
onclick="paint(this)" />

<rect x="75" y="20" width="20" height="70"
class="shape"
onclick="paint(this)" />

<rect x="105" y="20" width="20" height="70"
class="shape"
onclick="paint(this)" />

</svg>

<div class="name">Rabbit</div>

<button onclick="clearCard(this)">Clear</button>

</div>

<!-- MONKEY -->

<div class="card">

<svg viewBox="0 0 200 200">

<circle cx="100" cy="100" r="55"
class="shape"
onclick="paint(this)" />

<circle cx="60" cy="70" r="18"
class="shape"
onclick="paint(this)" />

<circle cx="140" cy="70" r="18"
class="shape"
onclick="paint(this)" />

<ellipse cx="100" cy="110" rx="25" ry="20"
class="shape"
onclick="paint(this)" />

</svg>

<div class="name">Monkey</div>

<button onclick="clearCard(this)">Clear</button>

</div>

<!-- GIRAFFE -->

<div class="card">

<svg viewBox="0 0 200 200">

<circle cx="100" cy="55" r="30"
class="shape"
onclick="paint(this)" />

<rect x="85" y="80" width="30" height="70"
class="shape"
onclick="paint(this)" />

<rect x="70" y="150" width="15" height="35"
class="shape"
onclick="paint(this)" />

<rect x="115" y="150" width="15" height="35"
class="shape"
onclick="paint(this)" />

</svg>

<div class="name">Giraffe</div>

<button onclick="clearCard(this)">Clear</button>

</div>

</div>

<script>

let selectedColor = "red";

function setColor(color){

    selectedColor = color;

}

function paint(shape){

    shape.style.fill = selectedColor;

}

function clearCard(button){

    let card = button.parentElement;

    let shapes = card.querySelectorAll('.shape');

    shapes.forEach(shape=>{

        shape.style.fill = "white";

    });

}

</script>

</body>
</html>
