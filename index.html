<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kids Cartoon Coloring</title>

<style>

body{
    margin:0;
    padding:20px;
    font-family:Arial;
    background:#f0f8ff;
}

h1{
    text-align:center;
    color:#ff1493;
    font-size:40px;
}

.colors{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin:25px 0;
}

.color{
    width:50px;
    height:50px;
    border-radius:50%;
    border:3px solid white;
    cursor:pointer;
    box-shadow:0 3px 8px rgba(0,0,0,0.3);
}

.container{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

svg{
    width:220px;
    height:220px;
    cursor:pointer;
}

.name{
    font-size:24px;
    margin-top:10px;
    font-weight:bold;
}

button{
    margin-top:10px;
    padding:10px 20px;
    border:none;
    border-radius:30px;
    background:#ff1493;
    color:white;
    font-size:18px;
    cursor:pointer;
}

</style>
</head>

<body>

<h1>🎨 Cartoon Coloring Book</h1>

<div class="colors">

<div class="color" style="background:red" onclick="setColor('red')"></div>
<div class="color" style="background:blue" onclick="setColor('blue')"></div>
<div class="color" style="background:green" onclick="setColor('green')"></div>
<div class="color" style="background:yellow" onclick="setColor('yellow')"></div>
<div class="color" style="background:orange" onclick="setColor('orange')"></div>
<div class="color" style="background:pink" onclick="setColor('pink')"></div>
<div class="color" style="background:purple" onclick="setColor('purple')"></div>
<div class="color" style="background:black" onclick="setColor('black')"></div>

</div>

<div class="container">

<!-- CAT -->

<div class="card">

<svg viewBox="0 0 200 200">

<circle cx="100" cy="100" r="60"
stroke="black"
stroke-width="4"
fill="white"
onclick="fillColor(this)" />

<polygon points="60,60 80,20 100,60"
stroke="black"
stroke-width="4"
fill="white"
onclick="fillColor(this)" />

<polygon points="100,60 120,20 140,60"
stroke="black"
stroke-width="4"
fill="white"
onclick="fillColor(this)" />

</svg>

<div class="name">Cute Cat</div>

<button onclick="reset(this)">Clear</button>

</div>

<!-- LION -->

<div class="card">

<svg viewBox="0 0 200 200">

<circle cx="100" cy="100" r="70"
stroke="black"
stroke-width="4"
fill="white"
onclick="fillColor(this)" />

<circle cx="100" cy="100" r="40"
stroke="black"
stroke-width="4"
fill="white"
onclick="fillColor(this)" />

</svg>

<div class="name">Happy Lion</div>

<button onclick="reset(this)">Clear</button>

</div>

<!-- PANDA -->

<div class="card">

<svg viewBox="0 0 200 200">

<circle cx="100" cy="100" r="60"
stroke="black"
stroke-width="4"
fill="white"
onclick="fillColor(this)" />

<circle cx="70" cy="70" r="20"
stroke="black"
stroke-width="4"
fill="white"
onclick="fillColor(this)" />

<circle cx="130" cy="70" r="20"
stroke="black"
stroke-width="4"
fill="white"
onclick="fillColor(this)" />

</svg>

<div class="name">Funny Panda</div>

<button onclick="reset(this)">Clear</button>

</div>

<!-- ELEPHANT -->

<div class="card">

<svg viewBox="0 0 200 200">

<circle cx="100" cy="100" r="55"
stroke="black"
stroke-width="4"
fill="white"
onclick="fillColor(this)" />

<circle cx="55" cy="100" r="25"
stroke="black"
stroke-width="4"
fill="white"
onclick="fillColor(this)" />

<circle cx="145" cy="100" r="25"
stroke="black"
stroke-width="4"
fill="white"
onclick="fillColor(this)" />

</svg>

<div class="name">Baby Elephant</div>

<button onclick="reset(this)">Clear</button>

</div>

<!-- RABBIT -->

<div class="card">

<svg viewBox="0 0 200 200">

<circle cx="100" cy="120" r="50"
stroke="black"
stroke-width="4"
fill="white"
onclick="fillColor(this)" />

<rect x="75" y="20" width="20" height="70"
stroke="black"
stroke-width="4"
fill="white"
onclick="fillColor(this)" />

<rect x="105" y="20" width="20" height="70"
stroke="black"
stroke-width="4"
fill="white"
onclick="fillColor(this)" />

</svg>

<div class="name">Little Rabbit</div>

<button onclick="reset(this)">Clear</button>

</div>

<!-- MONKEY -->

<div class="card">

<svg viewBox="0 0 200 200">

<circle cx="100" cy="100" r="55"
stroke="black"
stroke-width="4"
fill="white"
onclick="fillColor(this)" />

<circle cx="60" cy="70" r="20"
stroke="black"
stroke-width="4"
fill="white"
onclick="fillColor(this)" />

<circle cx="140" cy="70" r="20"
stroke="black"
stroke-width="4"
fill="white"
onclick="fillColor(this)" />

</svg>

<div class="name">Smiling Monkey</div>

<button onclick="reset(this)">Clear</button>

</div>

</div>

<script>

let selectedColor = "red";

function setColor(color){
    selectedColor = color;
}

function fillColor(element){
    element.setAttribute("fill", selectedColor);
}

function reset(button){

    let card = button.parentElement;

    let shapes = card.querySelectorAll("circle, rect, polygon");

    shapes.forEach(shape=>{
        shape.setAttribute("fill","white");
    });
}

</script>

</body>
</html>
